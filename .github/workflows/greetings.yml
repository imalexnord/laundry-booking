name: Greetings
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue.

            This project is a privacy-friendly laundry booking system for small apartment buildings, built with Cloudflare Workers and D1.

            Please include as much detail as possible, especially:
            - what you expected to happen
            - what actually happened
            - any relevant browser/device details
            - steps to reproduce the issue

          pr-message: |
            Thanks for opening your first pull request.

            Please make sure your PR:
            - keeps the app generic and reusable
            - does not include real addresses, real apartment numbers, secrets, or production database IDs
            - passes `npm run check`
            - does not add unnecessary personal data collection

            I’ll review it when I can.
